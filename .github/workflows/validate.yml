name: Validate

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: python -m py_compile custom_components/arte_forecast/*.py tests/*.py

      - name: Run unit tests
        run: python -m unittest tests.test_forecast tests.test_plant_helpers -v
